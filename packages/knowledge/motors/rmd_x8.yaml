  speedLoop: { kp: 0.5, ki: 0.1, kd: 0.02 }

safety:
  maxCurrentA: 5.5
  maxTempC: 75
  maxSpeedRpm: 60
  currentLimitSoftA: 5.0
  watchdogTimeoutMs: 50

source:
