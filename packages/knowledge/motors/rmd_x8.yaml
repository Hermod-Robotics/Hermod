id: "rmd-x8"
category: "motor"
type: "Servo"
tags: ["谐波减速", "一体化", "机械臂", "轻量"]

physical:
  weightG: 280
  dimensionsMm: [60, 60, 85]
  shaftDiameterMm: 10
  mounting: "M4×8, 6-hole PCD 50mm"

electrical:
  ratedVoltageV: 24
  ratedCurrentA: 2.2
  peakCurrentA: 6.0
  phaseResistanceOhm: 0.5
  phaseInductanceMh: 0.2
  polePairs: 7
  kvRpmPerV: 120

