# ============================================================
# DJI M3508 — Brushless DC Gear Motor (RoboMaster)
# ============================================================

id: "dji-m3508"
category: "motor"
type: "BLDC"
tags: ["robomaster", "轮毂电机", "小型机器人", "减速电机"]

# ---- Physical Parameters ----
physical:
  weightG: 365
  dimensionsMm: [42, 42, 65]
  shaftDiameterMm: 10
  mounting: "M3×4"

# ---- Electrical Parameters ----
electrical:
  ratedVoltageV: 24
  ratedCurrentA: 2.5
  peakCurrentA: 10
  phaseResistanceOhm: 0.45
  phaseInductanceMh: 0.15
  polePairs: 7
  kvRpmPerV: 200

# ---- Mechanical Parameters ----
mechanical:
  ratedTorqueNm: 0.25
  peakTorqueNm: 1.0
  maxSpeedRpm: 1000
  reductionRatio: 19.2
  backlashDeg: 0.5

# ---- Control Interface ----
control:
  protocol: "CAN"
  canBaudrate: 1000000
  defaultCanId: 0x201
  controlMode: ["position", "speed", "current"]
  feedback: ["angle", "speed", "current", "temperature"]

# ---- PID Defaults (from RoboMaster experience) ----
pidDefaults:
  currentLoop:
    kp: 0.8
    ki: 0.05
    kd: 0.0
  speedLoop:
    kp: 0.5
    ki: 0.1
    kd: 0.02
  positionLoop:
    kp: 2.0
    ki: 0.0
    kd: 0.1

# ---- @ai-lock: Safety Boundaries ----
safety:
  maxCurrentA: 8.0
  maxTempC: 80
  maxSpeedRpm: 1000
  currentLimitSoftA: 6.0
  watchdogTimeoutMs: 100

# ---- Source ----
source:
  datasheet: "https://www.robomaster.com/en-US/products/components/general/M3508"
  vendor: "DJI"
  verifiedBy: ["robomaster-community"]
  lastUpdated: "2025-06-25"
  notes: "Widely used in RoboMaster competitions. 19.2:1 planetary gearbox. CAN feedback at 1 kHz."
