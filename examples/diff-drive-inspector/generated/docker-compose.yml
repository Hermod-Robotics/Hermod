# Docker Compose — Auto-generated by Hermod
# Start simulation: docker compose up

services:
  gazebo:
    image: osrf/ros:humble-desktop-full
    container_name: 巡检机器人-c3_sim
    environment:
      - DISPLAY=${DISPLAY:-''}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./sim/gazebo:/workspace/sim/gazebo:ro
      - ./urdf:/workspace/urdf:ro
      - ./ros2_ws:/workspace/ros2_ws:ro
      - ./docker/entrypoint.sh:/entrypoint.sh:ro
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               source /workspace/ros2_ws/install/setup.bash 2>/dev/null || true &&
               gazebo --verbose /workspace/sim/gazebo/巡检机器人-c3.sdf"
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
